name: Server Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        shell: bash
        run: |
          go build -trimpath -ldflags="-s -w" -o ccnexus-server ./cmd/server
          chmod +x ccnexus-server

      - name: Package server artifact
        shell: bash
        run: |
          tar -czf ccnexus-server-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz ccnexus-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccnexus-server-${{ steps.get_version.outputs.version }}-linux-amd64
          path: ccnexus-server-*.tar.gz

  release-server:
    needs: build-server
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
